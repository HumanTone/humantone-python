name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+*"

jobs:
  verify-version-matches-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compare __version__ to tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          TAG="${TAG#v}"
          CONSTANT=$(python -c "import sys; sys.path.insert(0, 'src'); from humantone._version import __version__; print(__version__)")
          if [ "$TAG" != "$CONSTANT" ]; then
            echo "Tag '$TAG' does not match __version__ '$CONSTANT'"
            exit 1
          fi

  build-and-publish:
    needs: verify-version-matches-tag
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # critical for Trusted Publishing OIDC
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: Check distribution
        run: python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No `with: password:` — uses OIDC automatically
